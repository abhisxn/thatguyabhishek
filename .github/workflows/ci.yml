name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build (notion-sync + next build)
        run: npm run build
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
